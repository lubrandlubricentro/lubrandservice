<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>LubrandService</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f1117;font-family:'Segoe UI',system-ui,sans-serif;color:#f0f0f0;min-height:100vh}
.header{background:#1a1e2e;border-bottom:1px solid #252a3d;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px}
.logo-name{font-weight:800;font-size:17px;color:#f5a623}
.logo-sub{font-size:11px;color:#8892a4}
.header-btns{display:flex;gap:8px;align-items:center}
.btn-exp{background:#22c55e22;border:1px solid #22c55e;border-radius:8px;color:#22c55e;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer}
.btn-imp{background:#3b82f622;border:1px solid #3b82f6;border-radius:8px;color:#3b82f6;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer}
.alerta-badge{background:#ef4444;color:#fff;border-radius:99px;padding:3px 10px;font-size:12px;font-weight:700;display:none}
.nav{background:#1a1e2e;border-bottom:1px solid #252a3d;display:flex;overflow-x:auto}
.nav-btn{background:none;border:none;border-bottom:2px solid transparent;color:#8892a4;padding:12px 16px;cursor:pointer;font-weight:400;font-size:13px;white-space:nowrap}
.nav-btn.active{color:#f5a623;border-bottom-color:#f5a623;font-weight:700}
.content{max-width:960px;margin:0 auto;padding:20px 16px 60px}
.card{background:#1a1e2e;border:1px solid #252a3d;border-radius:16px;padding:20px;margin-bottom:12px}
.stats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.stat{flex:1;min-width:120px;background:#1a1e2e;border:1px solid #252a3d;border-radius:16px;padding:18px}
.btn{border:none;border-radius:8px;padding:9px 20px;font-weight:700;font-size:14px;cursor:pointer;display:inline-block}
.btn-acc{background:#f5a623;color:#111}
.btn-grn{background:#22c55e;color:#fff}
.btn-red{background:#ef4444;color:#fff}
.btn-blu{background:#3b82f6;color:#fff}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-wa{background:#25D36622;border:1px solid #25D366;border-radius:8px;color:#25D366;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:4px}
.ff{display:flex;flex-direction:column;gap:5px;font-size:13px;color:#8892a4}
.ff input,.ff select{background:#111420;border:1px solid #252a3d;border-radius:8px;padding:8px 12px;color:#f0f0f0;font-size:14px;outline:none;width:100%}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tipo-btn{background:#111420;border:1px solid #252a3d;border-radius:8px;padding:6px 12px;font-size:13px;color:#8892a4;cursor:pointer}
.tipo-btn.sel{background:#f5a623;border-color:#f5a623;color:#111;font-weight:700}
.overlay{position:fixed;inset:0;background:#000c;z-index:1000;display:none;align-items:center;justify-content:center;padding:16px}
.modal{background:#1a1e2e;border:1px solid #252a3d;border-radius:20px;padding:24px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto}
.modal.wide{max-width:680px}
.mhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.mtitle{color:#f5a623;font-size:18px;font-weight:700}
.mclose{background:none;border:none;color:#8892a4;font-size:22px;cursor:pointer}
.badge{padding:2px 10px;border-radius:99px;font-size:11px;font-weight:700;display:inline-block}
.bg{background:#22c55e22;color:#22c55e}
.br{background:#ef444422;color:#ef4444}
.by{background:#f5a62322;color:#f5a623}
.bb{background:#3b82f622;color:#3b82f6}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.vcard{background:#111420;border-radius:10px;padding:10px 14px;font-size:13px;min-width:160px;border-left:3px solid #252a3d}
.vcard.al{border-left-color:#f5a623}
input[type=file]{display:none}
.inf{font-size:11px;color:#8892a4;font-style:italic;margin-top:4px}
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <svg width="26" height="32" viewBox="0 0 100 115">
      <path d="M28 5L28 78Q28 88 40 88L78 88L78 102Q78 112 66 112L28 112Q12 112 12 96L12 5Z" fill="#c0392b"/>
      <path d="M28 72L28 96Q28 112 44 112L82 112Q98 112 98 96L98 88Q98 76 84 76L42 76Q28 76 28 72Z" fill="#1ab6d4"/>
    </svg>
    <div>
      <div class="logo-name">LubrandService</div>
      <div class="logo-sub">Lubrand Lubricentro</div>
    </div>
  </div>
  <div class="header-btns">
    <span id="badge-alertas" class="alerta-badge"></span>
    <button class="btn-exp" onclick="exportar()">💾 Exportar</button>
    <label class="btn-imp">📂 Importar<input type="file" accept=".json" onchange="importar(this)"></label>
  </div>
</div>

<div class="nav" id="nav">
  <button class="nav-btn active" onclick="goTab('panel',this)">🏠 Panel</button>
  <button class="nav-btn" onclick="goTab('clientes',this)">👥 Clientes</button>
  <button class="nav-btn" onclick="goTab('servicios',this)">🔧 Servicios</button>
  <button class="nav-btn" onclick="goTab('turnos',this)">📅 Turnos</button>
  <button class="nav-btn" onclick="goTab('facturacion',this)">💰 Facturación</button>
  <button class="nav-btn" onclick="goTab('cuentas',this)">💼 Cuentas</button>
</div>

<div class="content" id="content"></div>

<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="mbox">
    <div class="mhead">
      <div class="mtitle" id="mtitle"></div>
      <button class="mclose" onclick="closeModal()">✕</button>
    </div>
    <div id="mbody"></div>
  </div>
</div>

<script>
// ── DB ────────────────────────────────────────────────────────────────────────
var DB = {clientes:[],vehiculos:[],servicios:[],turnos:[],cuentas:[]};
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbydATOjZHRKIcJ4fw3WhHt6lJeHmNapxVtbTRK-2YEsuQKJSpX2FpM6I4cz_jPQqwhy/exec';
var saving = false;

function loadDB(){
  document.getElementById('content').innerHTML='<div style="text-align:center;padding:40px;color:#8892a4">⏳ Cargando datos...</div>';
  fetch(SCRIPT_URL+'?action=get')
    .then(function(r){return r.json();})
    .then(function(data){
      if(data.clientes)DB.clientes=data.clientes;
      if(data.vehiculos)DB.vehiculos=data.vehiculos;
      if(data.servicios)DB.servicios=data.servicios;
      if(data.turnos)DB.turnos=data.turnos;
      if(data.cuentas)DB.cuentas=data.cuentas;
      render();
    })
    .catch(function(e){
      console.log('Error cargando:',e);
      render();
    });
}

function saveDB(){
  if(saving)return;
  saving=true;
  fetch(SCRIPT_URL, {
    method:'POST',
    body:JSON.stringify({action:'save',clientes:DB.clientes,vehiculos:DB.vehiculos,servicios:DB.servicios,turnos:DB.turnos,cuentas:DB.cuentas})
  })
  .then(function(r){return r.json();})
  .then(function(){saving=false;})
  .catch(function(e){saving=false;console.log('Error guardando:',e);});
}
function exportar(){
  var blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='lubrandservice-backup.json';a.click();
}
function importar(inp){
  var file=inp.files[0];if(!file)return;
  var r=new FileReader();
  r.onload=function(e){
    try{var d=JSON.parse(e.target.result);
      for(var k in d){if(DB[k]!==undefined)DB[k]=d[k];}
      saveDB();render();alert('✅ Datos importados!');
    }catch(x){alert('Error al importar.');}
  };
  r.readAsText(file);
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
var uid=function(){return Date.now()+''+Math.floor(Math.random()*9999);};
var today=function(){return new Date().toISOString().slice(0,10);};
var ddiff=function(d){return Math.ceil((new Date(d)-new Date())/86400000);};
var fmtF=function(d){if(!d)return'—';var p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0];};
var fmtK=function(k){return k?Number(k).toLocaleString('es-AR')+' km':'—';};
var fmt$=function(n){return '$'+Number(n||0).toLocaleString('es-AR');};
var TIPOS=['Cambio de aceite','Filtro de aceite','Filtro de aire','Filtro de habitáculo','Filtro de combustible','Lubricación','Revisión general','Cambio de pastillas','Alineación','Otro'];
var SERVS=['Cambio de aceite','Cambio de filtros','Revisión general','Lubricación','Otro'];
var tiposSel=[];
var remitoId='';

function wa(tel,msg){
  if(!tel){alert('Sin teléfono cargado.');return;}
  var t=tel.replace(/[^0-9]/g,'');
  var c=t.startsWith('54')?t:'54'+t;
  window.open('https://wa.me/'+c+'?text='+encodeURIComponent(msg),'_blank');
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function openModal(title,body,wide){
  document.getElementById('mtitle').textContent=title;
  document.getElementById('mbody').innerHTML=body;
  document.getElementById('mbox').className=wide?'modal wide':'modal';
  document.getElementById('overlay').style.display='flex';
}
function closeModal(e){
  if(e&&e.target!==document.getElementById('overlay'))return;
  document.getElementById('overlay').style.display='none';
}

// ── TABS ──────────────────────────────────────────────────────────────────────
var tabActual='panel';
function goTab(tab,btn){
  tabActual=tab;
  document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('active');});
  if(btn)btn.classList.add('active');
  render();
}
function render(){
  updateBadge();
  if(tabActual==='panel')renderPanel();
  else if(tabActual==='clientes')renderClientes();
  else if(tabActual==='servicios')renderServicios();
  else if(tabActual==='turnos')renderTurnos();
  else if(tabActual==='facturacion')renderFact();
  else if(tabActual==='cuentas')renderCuentas();
}
function updateBadge(){
  var n=DB.servicios.filter(function(s){return s.proximaFecha&&ddiff(s.proximaFecha)<=30;}).length;
  var el=document.getElementById('badge-alertas');
  if(n>0){el.style.display='';el.textContent=n+' alertas';}
  else el.style.display='none';
}

// ── PANEL ─────────────────────────────────────────────────────────────────────
function renderPanel(){
  var hoy=today();
  var th=DB.turnos.filter(function(t){return t.fecha===hoy&&t.estado==='pendiente';});
  var venc=DB.servicios.filter(function(s){return s.proximaFecha&&ddiff(s.proximaFecha)<0;});
  var prox=DB.servicios.filter(function(s){return s.proximaFecha&&ddiff(s.proximaFecha)>=0&&ddiff(s.proximaFecha)<=30;});
  var h='<div class="stats">';
  [{i:'👥',l:'Clientes',v:DB.clientes.length,c:'#f5a623'},{i:'🚗',l:'Vehículos',v:DB.vehiculos.length,c:'#f5a623'},{i:'🔧',l:'Servicios',v:DB.servicios.length,c:'#f5a623'},{i:'📅',l:'Turnos hoy',v:th.length,c:'#3b82f6'}].forEach(function(s){
    h+='<div class="stat"><div style="font-size:22px">'+s.i+'</div><div style="font-size:26px;font-weight:800;color:'+s.c+';margin-top:4px">'+s.v+'</div><div style="font-size:12px;color:#8892a4">'+s.l+'</div></div>';
  });
  h+='</div>';
  if(th.length>0){
    h+='<div class="card" style="border-color:#3b82f6"><div style="color:#3b82f6;font-weight:700;margin-bottom:10px">📅 Turnos de hoy</div>';
    th.forEach(function(t){var c=DB.clientes.find(function(x){return x.id===t.clienteId;})||{};var v=DB.vehiculos.find(function(x){return x.id===t.vehiculoId;})||{};h+='<div style="background:#111420;border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:13px"><strong>'+t.hora+' — '+(c.nombre||'')+'</strong><div style="color:#8892a4">'+(v.marca||'')+' '+(v.modelo||'')+' | '+t.servicio+'</div></div>';});
    h+='</div>';
  }
  if(venc.length||prox.length){
    h+='<div class="card" style="border-color:#f5a623"><div style="color:#f5a623;font-weight:700;margin-bottom:10px">⚠️ Alertas de servicio</div>';
    venc.forEach(function(s){var v=DB.vehiculos.find(function(x){return x.id===s.vehiculoId;})||{};h+='<div style="background:#ef444415;border-radius:8px;padding:7px 12px;margin-bottom:5px;font-size:13px"><span class="badge br">VENCIDO</span> <strong>'+(v.patente||'')+' '+(v.marca||'')+' '+(v.modelo||'')+'</strong><div style="color:#8892a4">Venció el '+s.proximaFecha+'</div></div>';});
    prox.forEach(function(s){var v=DB.vehiculos.find(function(x){return x.id===s.vehiculoId;})||{};h+='<div style="background:#f5a62315;border-radius:8px;padding:7px 12px;margin-bottom:5px;font-size:13px"><span class="badge by">'+ddiff(s.proximaFecha)+'d</span> <strong>'+(v.patente||'')+' '+(v.marca||'')+' '+(v.modelo||'')+'</strong><div style="color:#8892a4">Vence '+s.proximaFecha+'</div></div>';});
    h+='</div>';
  }
  if(!th.length&&!venc.length&&!prox.length)h+='<div class="card" style="text-align:center;color:#8892a4;padding:30px">✅ Todo en orden</div>';
  document.getElementById('content').innerHTML=h;
}

// ── CLIENTES ──────────────────────────────────────────────────────────────────
var cliSearch='';
function renderClientes(){
  var list=DB.clientes.filter(function(c){return (c.nombre||'').toLowerCase().includes(cliSearch.toLowerCase())||(c.telefono||'').includes(cliSearch);});
  var h='<div class="row" style="justify-content:space-between;margin-bottom:16px">'
    +'<div style="font-weight:700;font-size:16px">👥 Clientes</div>'
    +'<div class="row" style="gap:8px">'
    +'<input placeholder="Buscar..." style="background:#111420;border:1px solid #252a3d;border-radius:8px;padding:8px 12px;color:#f0f0f0;font-size:14px;outline:none;width:150px" oninput="cliSearch=this.value;renderClientes()" value="'+cliSearch+'">'
    +'<button class="btn btn-acc" onclick="abrirCli()">+ Cliente</button>'
    +'</div></div>';
  if(!list.length)h+='<div class="card" style="text-align:center;color:#8892a4;padding:30px">No hay clientes aún.</div>';
  list.forEach(function(c){
    var vehs=DB.vehiculos.filter(function(v){return v.clienteId===c.id;});
    h+='<div class="card"><div class="row" style="justify-content:space-between;margin-bottom:8px">'
      +'<div><div style="font-weight:700;font-size:16px">'+(c.nombre||'Sin nombre')+'</div>'
      +'<div style="color:#8892a4;font-size:13px">📞 '+(c.telefono||'—')+(c.email?' • ✉️ '+c.email:'')+'</div></div>'
      +'<div class="row" style="gap:6px">'
      +'<button class="btn btn-blu btn-sm" onclick="abrirCli(\''+c.id+'\')">Editar</button>'
      +'<button class="btn btn-grn btn-sm" onclick="abrirVeh(\'\',\''+c.id+'\')">+ Vehículo</button>'
      +'<button class="btn btn-red btn-sm" onclick="delCli(\''+c.id+'\')">✕</button>'
      +'</div></div>';
    if(vehs.length){
      h+='<div class="row" style="gap:8px;flex-wrap:wrap">';
      vehs.forEach(function(v){
        var ult=DB.servicios.filter(function(s){return s.vehiculoId===v.id;}).sort(function(a,b){return b.fecha.localeCompare(a.fecha);})[0];
        var al=ult&&ult.proximaFecha&&ddiff(ult.proximaFecha)<=30;
        h+='<div class="vcard'+(al?' al':'')+'">'
          +'<div class="row" style="justify-content:space-between">'
          +'<span style="font-weight:700">'+(v.patente||'Sin patente')+'</span>'
          +'<button class="btn btn-blu btn-sm" onclick="abrirVeh(\''+v.id+'\',\''+c.id+'\')">Editar</button>'
          +'</div>'
          +'<div style="color:#8892a4">'+(v.marca||'')+' '+(v.modelo||'')+' '+(v.año||'')+'</div>'
          +'<div style="color:#8892a4">🔢 '+Number(v.km||0).toLocaleString()+' km</div>'
          +(ult&&ult.proximaFecha?'<div style="color:'+(al?'#f5a623':'#8892a4')+';font-size:11px;margin-top:4px">Próx: '+ult.proximaFecha+'</div>':'')
          +'</div>';
      });
      h+='</div>';
    }
    h+='</div>';
  });
  document.getElementById('content').innerHTML=h;
}
function abrirCli(id){
  var c=id?DB.clientes.find(function(x){return x.id==id;})||{}:{};
  openModal(id?'Editar Cliente':'Nuevo Cliente',
    '<div style="display:flex;flex-direction:column;gap:12px">'
    +'<div class="ff"><label>Nombre</label><input id="fn" value="'+(c.nombre||'')+'"></div>'
    +'<div class="ff"><label>Teléfono</label><input id="ft" value="'+(c.telefono||'')+'"></div>'
    +'<div class="ff"><label>Email</label><input id="fe" value="'+(c.email||'')+'"></div>'
    +'<button class="btn btn-acc" style="margin-top:8px" onclick="saveCli(\''+id+'\')">Guardar</button>'
    +'</div>');
}
function saveCli(id){
  var o={nombre:document.getElementById('fn').value,telefono:document.getElementById('ft').value,email:document.getElementById('fe').value};
  if(id)DB.clientes=DB.clientes.map(function(c){return c.id==id?Object.assign({},c,o):c;});
  else DB.clientes.push(Object.assign({id:uid()},o));
  saveDB();closeModal();renderClientes();
}
function delCli(id){
  if(!confirm('¿Eliminar cliente?'))return;
  DB.clientes=DB.clientes.filter(function(c){return c.id!=id;});
  DB.vehiculos=DB.vehiculos.filter(function(v){return v.clienteId!=id;});
  saveDB();renderClientes();
}
function abrirVeh(vid,cid){
  var v=vid?DB.vehiculos.find(function(x){return x.id==vid;})||{}:{};
  var c=DB.clientes.find(function(x){return x.id==cid;})||{};
  openModal(vid?'Editar Vehículo':'Nuevo Vehículo — '+(c.nombre||''),
    '<div style="display:flex;flex-direction:column;gap:12px">'
    +'<div class="ff"><label>Patente</label><input id="fp" value="'+(v.patente||'')+'" style="text-transform:uppercase"></div>'
    +'<div class="fg">'
    +'<div class="ff"><label>Marca</label><input id="fm" value="'+(v.marca||'')+'"></div>'
    +'<div class="ff"><label>Modelo</label><input id="fmo" value="'+(v.modelo||'')+'"></div>'
    +'<div class="ff"><label>Año</label><input id="fa" type="number" value="'+(v.año||'')+'"></div>'
    +'<div class="ff"><label>KM</label><input id="fk" type="number" value="'+(v.km||'')+'"></div>'
    +'</div>'
    +'<button class="btn btn-acc" style="margin-top:8px" onclick="saveVeh(\''+vid+'\',\''+cid+'\')">Guardar</button>'
    +'</div>');
}
function saveVeh(vid,cid){
  var o={patente:document.getElementById('fp').value.toUpperCase(),marca:document.getElementById('fm').value,modelo:document.getElementById('fmo').value,año:document.getElementById('fa').value,km:document.getElementById('fk').value};
  if(vid)DB.vehiculos=DB.vehiculos.map(function(v){return v.id==vid?Object.assign({},v,o):v;});
  else DB.vehiculos.push(Object.assign({id:uid(),clienteId:cid},o));
  saveDB();closeModal();renderClientes();
}

// ── SERVICIOS ─────────────────────────────────────────────────────────────────
var srvSearch='';
function renderServicios(){
  var list=DB.servicios.filter(function(s){
    if(!srvSearch)return true;
    var v=DB.vehiculos.find(function(x){return x.id===s.vehiculoId;})||{};
    var c=DB.clientes.find(function(x){return x.id===v.clienteId;})||{};
    return (v.patente||'').includes(srvSearch.toUpperCase())||(c.nombre||'').toLowerCase().includes(srvSearch.toLowerCase());
  }).sort(function(a,b){return b.fecha.localeCompare(a.fecha);});
  var h='<div class="row" style="justify-content:space-between;margin-bottom:16px">'
    +'<div style="font-weight:700;font-size:16px">🔧 Servicios</div>'
    +'<div class="row" style="gap:8px">'
    +'<input placeholder="Filtrar..." style="background:#111420;border:1px solid #252a3d;border-radius:8px;padding:8px 12px;color:#f0f0f0;font-size:14px;outline:none;width:140px" oninput="srvSearch=this.value;renderServicios()" value="'+srvSearch+'">'
    +'<button class="btn btn-acc" onclick="abrirSrv()">+ Servicio</button>'
    +'</div></div>';
  if(!list.length)h+='<div class="card" style="text-align:center;color:#8892a4;padding:30px">Sin servicios registrados.</div>';
  list.forEach(function(s){
    var v=DB.vehiculos.find(function(x){return x.id===s.vehiculoId;})||{};
    var c=DB.clientes.find(function(x){return x.id===v.clienteId;})||{};
    var d=s.proximaFecha?ddiff(s.proximaFecha):null;
    var msgS=buildMsgSrv(s,c,v);
    h+='<div class="card">'
      +'<div class="row" style="justify-content:space-between">'
      +'<div>'
      +'<div class="row" style="gap:8px;margin-bottom:4px"><span style="font-weight:700">'+(s.tipo||'Servicio')+'</span>'
      +(d!==null&&d<0?'<span class="badge br">Vencido</span>':'')
      +(d!==null&&d>=0&&d<=30?'<span class="badge by">'+d+'d</span>':'')
      +(d!==null&&d>30?'<span class="badge bg">Al día</span>':'')

  var tbh=TIPOS.map(function(x){return '<button class="tipo-btn'+(tiposSel.includes(x)?' sel':'')+'" onclick="togTipo(\''+x+'\')">'+(tiposSel.includes(x)?'✓ ':'')+x+'</button>';}).join('');
  openModal('✅ Completar servicio — '+(c.nombre||''),
    '<div style="background:#22c55e22;border:1px solid #22c55e;border-radius:8px;padding:10px;font-size:13px;color:#22c55e;margin-bottom:14px">Turno confirmado. Completá los detalles.</div>'
    +'<div style="display:flex;flex-direction:column;gap:14px">'
    +'<div class="ff"><label>Vehículo</label><input value="'+(v.patente||'')+' — '+(v.marca||'')+' '+(v.modelo||'')+'" disabled style="background:#111420;border:1px solid #252a3d;border-radius:8px;padding:8px 12px;color:#8892a4;font-size:14px;width:100%"></div>'
    +'<div><div style="font-size:13px;color:#8892a4;margin-bottom:8px">Servicios realizados</div><div id="tgrid" style="display:flex;flex-wrap:wrap;gap:8px">'+tbh+'</div></div>'
    +'<div class="fg">'
    +'<div class="ff"><label>Fecha</label><input type="date" id="sf" value="'+t.fecha+'" oninput="autoF(this.value)"></div>'
    +'<div class="ff"><label>KM actuales</label><input type="number" id="sk" oninput="autoK(this.value)"></div>'
    +'<div class="ff"><label>Próximo (fecha)</label><input type="date" id="spf"></div>'
    +'<div class="ff"><label>Próximo (km)</label><input type="number" id="spk"></div>'
    +'</div>'
    +'<div class="ff"><label>Detalle / producto</label><input id="sd"></div>'
    +'<div class="ff"><label>💲 Valor cobrado ($)</label><input type="number" id="sc"></div>'
    +'<button class="btn btn-acc" style="margin-top:4px" onclick="saveSrvDesdeTurno(\''+t.vehiculoId+'\')">✅ Guardar y generar remito</button>'
    +'</div>');
  autoF(t.fecha);
}
function saveSrvDesdeTurno(vid){
  var fecha=document.getElementById('sf').value;
  var tipo=tiposSel.length?tiposSel.join(' + '):'Servicio general';
  var s={id:uid(),vehiculoId:vid,fecha:fecha,tipo:tipo,tipos:tiposSel.slice(),
    km:document.getElementById('sk').value,detalle:document.getElementById('sd').value,
    costo:document.getElementById('sc').value,
    proximaFecha:document.getElementById('spf').value,
    proximoKm:document.getElementById('spk').value,estado:'completado'};
  DB.servicios.push(s);
  if(s.km)DB.vehiculos=DB.vehiculos.map(function(v){return v.id==vid?Object.assign({},v,{km:s.km}):v;});
  saveDB();closeModal();
  setTimeout(function(){abrirRemito(s.id);},300);
}
function estadoTurno(id,estado){
  DB.turnos=DB.turnos.map(function(t){return t.id==id?Object.assign({},t,{estado:estado}):t;});
  saveDB();renderTurnos();
}
function delTurno(id){
  DB.turnos=DB.turnos.filter(function(t){return t.id!=id;});
  saveDB();renderTurnos();
}

// ── FACTURACIÓN ───────────────────────────────────────────────────────────────
var factMes='';
function renderFact(){
  if(!factMes)factMes=today().slice(0,7);
  var list=DB.servicios.filter(function(s){return !factMes||s.fecha.startsWith(factMes);});
  var total=list.reduce(function(a,s){return a+Number(s.costo||0);},0);
  var h='<div class="row" style="justify-content:space-between;margin-bottom:16px">'
    +'<div style="font-weight:700;font-size:16px">💰 Facturación</div>'
    +'<input type="month" value="'+factMes+'" oninput="factMes=this.value;renderFact()" style="background:#111420;border:1px solid #252a3d;border-radius:8px;padding:8px 12px;color:#f0f0f0;font-size:14px;outline:none">'
    +'</div>'
    +'<div class="stats">'
    +'<div class="stat"><div style="color:#8892a4;font-size:13px">Total</div><div style="font-size:28px;font-weight:800;color:#22c55e">'+fmt$(total)+'</div></div>'
    +'<div class="stat"><div style="color:#8892a4;font-size:13px">Servicios</div><div style="font-size:28px;font-weight:800;color:#f5a623">'+list.length+'</div></div>'
    +'<div class="stat"><div style="color:#8892a4;font-size:13px">Promedio</div><div style="font-size:28px;font-weight:800;color:#3b82f6">'+fmt$(list.length?Math.round(total/list.length):0)+'</div></div>'
    +'</div>'
    +'<div class="card"><div style="font-weight:700;margin-bottom:12px">Detalle</div>';
  if(!list.length)h+='<div style="text-align:center;color:#8892a4;padding:20px">Sin registros</div>';
  list.sort(function(a,b){return b.fecha.localeCompare(a.fecha);}).forEach(function(s){
    var v=DB.vehiculos.find(function(x){return x.id===s.vehiculoId;})||{};
    var c=DB.clientes.find(function(x){return x.id===v.clienteId;})||{};
    h+='<div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #252a3d">'
      +'<div><div style="font-weight:600">'+(s.tipo||'')+'</div><div style="color:#8892a4;font-size:12px">'+s.fecha+' • '+(c.nombre||'')+' • '+(v.patente||'')+'</div></div>'
      +'<div style="color:#22c55e;font-weight:700">'+fmt$(s.costo)+'</div></div>';
  });
  if(list.length)h+='<div style="display:flex;justify-content:flex-end;padding-top:12px;font-weight:800;font-size:18px;color:#22c55e">TOTAL: '+fmt$(total)+'</div>';
  h+='</div>';
  document.getElementById('content').innerHTML=h;
}

// ── CUENTAS CORRIENTES ────────────────────────────────────────────────────────
function renderCuentas(){
  var abiertas=DB.cuentas.filter(function(c){return c.abierta;});
  var h='<div style="font-weight:700;font-size:16px;margin-bottom:16px">💼 Cuentas Corrientes</div>';
  if(!abiertas.length)h+='<div class="card" style="text-align:center;color:#8892a4;padding:30px">No hay cuentas abiertas.</div>';
  abiertas.forEach(function(cuenta){
    var cli=DB.clientes.find(function(c){return c.id===cuenta.clienteId;})||{};
    var srvs=cuenta.servicios.map(function(id){return DB.servicios.find(function(s){return s.id==id;});}).filter(Boolean);
    h+='<div class="card">'
      +'<div class="row" style="justify-content:space-between;margin-bottom:12px">'
      +'<div><div style="font-weight:700;font-size:16px">'+(cli.nombre||'—')+'</div>'
      +'<div style="color:#8892a4;font-size:13px">'+srvs.length+' servicio(s) desde '+cuenta.fecha+'</div></div>'
      +'<div style="font-size:22px;font-weight:800;color:#22c55e">'+fmt$(cuenta.total||0)+'</div>'
      +'</div>';
    srvs.forEach(function(s){h+='<div style="font-size:12px;color:#8892a4;padding:4px 0;border-bottom:1px solid #252a3d">'+s.fecha+' — '+(s.tipo||'')+' — '+fmt$(s.costo)+'</div>';});
    h+='<div class="row" style="gap:8px;margin-top:12px">'
      +'<button class="btn-wa" onclick="enviarCuenta(\''+cuenta.id+'\')">📱 Enviar resumen</button>'
      +'<button class="btn btn-red btn-sm" onclick="cerrarCuenta(\''+cuenta.id+'\')">Cerrar cuenta</button>'
      +'</div></div>';
  });
  document.getElementById('content').innerHTML=h;
}
function enviarCuenta(cid){
  var cuenta=DB.cuentas.find(function(c){return c.id==cid;});
  if(!cuenta)return;
  var cli=DB.clientes.find(function(c){return c.id===cuenta.clienteId;})||{};
  if(!cli.telefono){alert('El cliente no tiene teléfono.');return;}
  var srvs=cuenta.servicios.map(function(id){return DB.servicios.find(function(s){return s.id==id;});}).filter(Boolean);
  var lineas=srvs.map(function(s){return '• '+s.fecha+' — '+(s.tipo||'')+' — $'+Number(s.costo||0).toLocaleString('es-AR');}).join('\n');
  var msg='🧾 *RESUMEN DE CUENTA CORRIENTE*\n*Lubrand Lubricentro*\n\n'
    +'👤 *Cliente:* '+(cli.nombre||'')+'\n\n'
    +'*Servicios:*\n'+lineas+'\n\n'
    +'💰 *TOTAL: $'+Number(cuenta.total||0).toLocaleString('es-AR')+'*\n\n'
    +'_Gracias por elegirnos 🛢️_';
  wa(cli.telefono,msg);
}
function cerrarCuenta(id){
  if(!confirm('¿Cerrar esta cuenta?'))return;
  DB.cuentas=DB.cuentas.map(function(c){return c.id==id?Object.assign({},c,{abierta:false}):c;});
  saveDB();renderCuentas();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
loadDB();
render();
</script>
</body>
