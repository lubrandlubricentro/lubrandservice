<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>LubrandService</title>
<style>*{box-sizing:border-box;margin:0;padding:0}body{background:#0f1117;font-family:'Segoe UI',system-ui,sans-serif;color:#f0f0f0}</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel">
const{useState,useRef}=React;
const C={bg:"#0f1117",card:"#1a1e2e",cb:"#252a3d",acc:"#f5a623",grn:"#22c55e",red:"#ef4444",blu:"#3b82f6",txt:"#f0f0f0",mut:"#8892a4",inp:"#111420"};
const today=()=>new Date().toISOString().slice(0,10);
const ddiff=(d)=>Math.ceil((new Date(d)-new Date())/86400000);
const fmt$=(n)=>`$${Number(n).toLocaleString("es-AR")}`;
const fmtF=(d)=>{if(!d)return"—";const[y,m,dd]=d.split("-");return`${dd}/${m}/${y}`};
const fmtK=(k)=>k?Number(k).toLocaleString("es-AR")+" km":"—";
const TIPOS=["Cambio de aceite","Filtro de aceite","Filtro de aire","Filtro de combustible","Lubricación","Revisión general","Cambio de pastillas","Alineación","Otro"];

const Card=({children,style={}})=><div style={{background:C.card,border:`1px solid ${C.cb}`,borderRadius:16,padding:20,...style}}>{children}</div>;
const Btn=({children,onClick,color="acc",small,style={}})=>{
  const bg={acc:C.acc,red:C.red,grn:C.grn,blu:C.blu}[color]||C.acc;
  return <button onClick={onClick} style={{background:bg,color:color==="acc"?"#111":"#fff",border:"none",borderRadius:8,padding:small?"5px 12px":"9px 20px",fontWeight:700,fontSize:small?12:14,cursor:"pointer",...style}}>{children}</button>;
};
const Inp=({label,...p})=>(
  <label style={{display:"flex",flexDirection:"column",gap:5,fontSize:13,color:C.mut}}>
    {label}
    <input {...p} style={{background:C.inp,border:`1px solid ${C.cb}`,borderRadius:8,padding:"8px 12px",color:C.txt,fontSize:14,outline:"none"}}/>
  </label>
);
const Sel=({label,children,...p})=>(
  <label style={{display:"flex",flexDirection:"column",gap:5,fontSize:13,color:C.mut}}>
    {label}
    <select {...p} style={{background:C.inp,border:`1px solid ${C.cb}`,borderRadius:8,padding:"8px 12px",color:C.txt,fontSize:14,outline:"none"}}>{children}</select>
  </label>
);
const Badge=({color,children})=>{
  const bg={grn:"#22c55e22",red:"#ef444422",yel:"#f5a62322",blu:"#3b82f622"}[color]||"#3b82f622";
  const tc={grn:"#22c55e",red:"#ef4444",yel:"#f5a623",blu:"#3b82f6"}[color]||"#3b82f6";
  return <span style={{background:bg,color:tc,padding:"2px 10px",borderRadius:99,fontSize:11,fontWeight:700}}>{children}</span>;
};
const Modal=({title,onClose,children,wide})=>(
  <div style={{position:"fixed",inset:0,background:"#000c",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={onClose}>
    <div style={{background:C.card,border:`1px solid ${C.cb}`,borderRadius:20,padding:24,width:"100%",maxWidth:wide?760:520,maxHeight:"90vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <h3 style={{margin:0,color:C.acc,fontSize:18}}>{title}</h3>
        <button onClick={onClose} style={{background:"none",border:"none",color:C.mut,fontSize:22,cursor:"pointer"}}>✕</button>
      </div>
      {children}
    </div>
  </div>
);

const abrirWa=(tel,msg)=>{
  if(!tel)return;
  const t=tel.replace(/[^0-9]/g,"");
  const co=t.startsWith("54")?t:`54${t}`;
  window.open(`https://wa.me/${co}?text=${encodeURIComponent(msg)}`,"_blank");
};
const WaBtn=({tel,msg})=>(
  <button onClick={()=>{if(!tel){alert("El cliente no tiene teléfono.");return;}abrirWa(tel,msg);}}
    style={{background:"#25D36622",border:"1px solid #25D366",borderRadius:8,color:"#25D366",padding:"5px 10px",fontSize:12,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",gap:4}}>
    <svg width="13" height="13" viewBox="0 0 24 24" fill="#25D366"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
    WhatsApp
  </button>
);

const msgT=(t,c,v)=>{
  const dias=["domingo","lunes","martes","miércoles","jueves","viernes","sábado"];
  const f=new Date(t.fecha+"T12:00:00");
  const[a,m,d]=t.fecha.split("-");
  return `Hola ${c.nombre||""} 👋 Te recordamos que tenés un turno en *Lubrand Lubricentro* el *${dias[f.getDay()]} ${d}/${m}/${a}* a las *${t.hora} hs* para *${t.servicio}*${v.marca?` de tu ${v.marca} ${v.modelo}`:""}. ¡Te esperamos! 🛢️\n\n_Mensaje automático, no responder._`;
};
const msgS=(s,c,v)=>{
  const[a,m,d]=s.fecha.split("-");
  const items=s.tipos?.length>0?s.tipos.map(t=>`• ${t}`).join("\n"):"• Servicio general";
  return `Hola ${c.nombre||""} 👋 Te informamos que el servicio de tu ${v.marca?`${v.marca} ${v.modelo}`:"vehículo"}${v.patente?` (${v.patente})`:""} fue realizado el *${d}/${m}/${a}*.\n\n*Servicios realizados:*\n${items}${s.detalle?`\n\n*Detalle:* ${s.detalle}`:""}${s.proximaFecha?`\n\n⚠️ *Próximo servicio:* ${fmtF(s.proximaFecha)}${s.proximoKm?` / ${fmtK(s.proximoKm)}`:""}`:""}  \n\nGracias por elegirnos 🛢️ *Lubrand Lubricentro*\n\n_Mensaje automático, no responder._`;
};

function TarjetaLubrand({servicio:s,cliente:c,vehiculo:v}){
  const[flipped,setFlipped]=useState(false);
  const aceite=s.tipos?.includes("Cambio de aceite")?(s.detalle||"✓"):"";
  const fAceite=s.tipos?.includes("Filtro de aceite")?"✓":"";
  const fAire=s.tipos?.includes("Filtro de aire")?"✓":"";
  const fComb=s.tipos?.includes("Filtro de combustible")?"✓":"";
  const otros=s.tipos?.filter(t=>!["Cambio de aceite","Filtro de aceite","Filtro de aire","Filtro de combustible"].includes(t)).join(", ");
  return(
    <div style={{display:"flex",flexDirection:"column",gap:12,alignItems:"center"}}>
      <div style={{width:"100%",maxWidth:360,perspective:"800px",cursor:"pointer",margin:"0 auto"}} onClick={()=>setFlipped(f=>!f)}>
        <div style={{position:"relative",width:"100%",height:220,transition:"transform 0.7s",transformStyle:"preserve-3d",transform:flipped?"rotateY(180deg)":"none"}}>
          <div style={{position:"absolute",inset:0,borderRadius:16,overflow:"hidden",backfaceVisibility:"hidden",WebkitBackfaceVisibility:"hidden",background:"linear-gradient(135deg,#0d2257 0%,#1a3a7c 60%,#0d2257 100%)",display:"flex",flexDirection:"column",justifyContent:"space-between",position:"absolute"}}>
            <div style={{position:"absolute",top:8,right:12,fontSize:9,color:"#ffffff55"}}>Tocá para girar →</div>
            <div style={{padding:"20px 20px 0",display:"flex",alignItems:"center",gap:10,position:"relative",zIndex:2}}>
              <svg width="30" height="36" viewBox="0 0 30 36"><polygon points="15,0 30,20 0,20" fill="#c0392b"/><polygon points="4,16 26,16 22,36 8,36" fill="#1ab6d4"/></svg>
              <div><div style={{color:"#fff",fontSize:20,fontWeight:800,fontStyle:"italic"}}>Lubrand</div><div style={{color:"#a8d4e8",fontSize:10}}>lubricentro</div></div>
            </div>
            <div style={{padding:"0 20px 16px",position:"relative",zIndex:2}}>
              <div style={{fontSize:10,color:"#cce4f5"}}>Av. Agustín Alvarez N° 1179</div>
              <div style={{fontSize:12,color:"#fff",fontWeight:600,marginTop:2}}>☎ 2317 - 533031</div>
            </div>
            <div style={{position:"absolute",bottom:0,left:0,width:"100%",height:60,background:"#c0392b",clipPath:"ellipse(60% 100% at 20% 100%)"}}/>
            <div style={{position:"absolute",bottom:0,right:0,width:"65%",height:50,background:"#1ab6d4",clipPath:"ellipse(80% 100% at 80% 100%)"}}/>
          </div>
          <div style={{position:"absolute",inset:0,borderRadius:16,overflow:"hidden",backfaceVisibility:"hidden",WebkitBackfaceVisibility:"hidden",transform:"rotateY(180deg)",background:"#fff",color:"#111",display:"flex",flexDirection:"column",fontSize:11}}>
            <div style={{background:"#0d2257",color:"#fff",padding:"6px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:9,fontWeight:800,letterSpacing:1,textTransform:"uppercase"}}>Control de Lubricación</span>
              <span style={{fontSize:12,fontWeight:800,fontStyle:"italic",color:"#1ab6d4"}}>Lubrand</span>
            </div>
            <div style={{background:"#f0f6ff",padding:"3px 10px",fontSize:8,color:"#0d2257",display:"flex",gap:8,flexWrap:"wrap"}}>
              <span>👤 <strong>{c.nombre||"—"}</strong></span>
              <span>🚗 <strong>{(v.patente||"").toUpperCase()||"—"}</strong></span>
              <span>{v.marca} {v.modelo}</span>
            </div>
            <div style={{display:"flex",flex:1}}>
              <div style={{width:20,background:"#0d2257",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"space-around",padding:"4px 0"}}>
                <span style={{color:"#fff",fontSize:6,fontWeight:800,writingMode:"vertical-rl",transform:"rotate(180deg)"}}>ACEITES</span>
                <span style={{color:"#fff",fontSize:6,fontWeight:800,writingMode:"vertical-rl",transform:"rotate(180deg)"}}>FILTROS</span>
              </div>
              <div style={{flex:1,padding:"5px 8px",display:"flex",flexDirection:"column",gap:3}}>
                <div style={{display:"flex",gap:6}}>
                  <div style={{flex:1}}><div style={{fontSize:7,color:"#666",fontWeight:600,textTransform:"uppercase"}}>Fecha</div><div style={{fontSize:11,fontWeight:700,color:"#0d2257",borderBottom:"1.5px solid #1ab6d4"}}>{fmtF(s.fecha)}</div></div>
                  <div style={{flex:1}}><div style={{fontSize:7,color:"#666",fontWeight:600,textTransform:"uppercase"}}>KM Actuales</div><div style={{fontSize:11,fontWeight:700,color:"#0d2257",borderBottom:"1.5px solid #1ab6d4"}}>{fmtK(s.km)}</div></div>
                </div>
                <div style={{fontSize:7,fontWeight:800,color:"#c0392b",textTransform:"uppercase",marginTop:3,borderTop:"1px solid #eee",paddingTop:3}}>Aceites</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"2px 8px"}}>
                  {[["Motor",aceite],["Caja cambios",""],["Diferencial",""],["Dirección",""]].map(([l,val])=>(
                    <div key={l} style={{display:"flex",alignItems:"flex-end",gap:3}}><span style={{fontSize:7,color:"#555",whiteSpace:"nowrap"}}>{l}</span><span style={{flex:1,borderBottom:"1px solid #bbb",fontSize:8,fontWeight:700,color:"#0d2257",minHeight:11}}>{val}</span></div>
                  ))}
                </div>
                <div style={{fontSize:7,fontWeight:800,color:"#c0392b",textTransform:"uppercase",marginTop:3,borderTop:"1px solid #eee",paddingTop:3}}>Filtros</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"2px 8px"}}>
                  {[["Aceite",fAceite],["Aire",fAire],["Cabina",""],["Combustible",fComb]].map(([l,val])=>(
                    <div key={l} style={{display:"flex",alignItems:"flex-end",gap:3}}><span style={{fontSize:7,color:"#555",whiteSpace:"nowrap"}}>{l}</span><span style={{flex:1,borderBottom:"1px solid #bbb",fontSize:8,fontWeight:700,color:"#0d2257",minHeight:11}}>{val}</span></div>
                  ))}
                </div>
                {otros&&<><div style={{fontSize:7,fontWeight:800,color:"#c0392b",textTransform:"uppercase",marginTop:3,borderTop:"1px solid #eee",paddingTop:3}}>Otros</div><div style={{fontSize:8,color:"#0d2257",fontWeight:700}}>{otros}</div></>}
              </div>
            </div>
            <div style={{background:"#0d2257",color:"#fff",padding:"5px 10px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div><div style={{fontSize:7,fontWeight:700,textTransform:"uppercase",color:"#1ab6d4"}}>Próximo Service</div><div style={{fontSize:12,fontWeight:800}}>{fmtF(s.proximaFecha)}</div></div>
              <div style={{textAlign:"right"}}><div style={{fontSize:7,fontWeight:700,textTransform:"uppercase",color:"#1ab6d4"}}>Próximos KM</div><div style={{fontSize:12,fontWeight:800}}>{fmtK(s.proximoKm)}</div></div>
            </div>
          </div>
        </div>
      </div>
      <div style={{fontSize:11,color:C.mut,textAlign:"center"}}>Tocá la tarjeta para girarla</div>
    </div>
  );
}

function Dashboard({clientes,vehiculos,servicios,turnos}){
  const hoy=today();
  const turnosHoy=turnos.filter(t=>t.fecha===hoy&&t.estado==="pendiente");
  const proximos=servicios.filter(s=>s.proximaFecha&&ddiff(s.proximaFecha)>=0&&ddiff(s.proximaFecha)<=30);
  const vencidos=servicios.filter(s=>s.proximaFecha&&ddiff(s.proximaFecha)<0);
  return(
    <div style={{display:"flex",flexDirection:"column",gap:20}}>
      <h2 style={{margin:0,color:C.txt}}>🏠 Panel Principal</h2>
      <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
        {[{icon:"👥",label:"Clientes",val:clientes.length},{icon:"🚗",label:"Vehículos",val:vehiculos.length},{icon:"🔧",label:"Servicios",val:servicios.length},{icon:"📅",label:"Turnos hoy",val:turnosHoy.length,color:C.blu}].map(s=>(
          <Card key={s.label} style={{flex:1,minWidth:120}}>
            <div style={{fontSize:24}}>{s.icon}</div>
            <div style={{fontSize:26,fontWeight:800,color:s.color||C.acc,marginTop:4}}>{s.val}</div>
            <div style={{fontSize:12,color:C.mut}}>{s.label}</div>
          </Card>
        ))}
      </div>
      {turnosHoy.length>0&&<Card style={{borderColor:C.blu}}>
        <div style={{color:C.blu,fontWeight:700,marginBottom:10}}>📅 Turnos de hoy</div>
        {turnosHoy.map(t=>{const c=clientes.find(c=>c.id===t.clienteId)||{};const v=vehiculos.find(v=>v.id===t.vehiculoId)||{};
          return <div key={t.id} style={{background:C.inp,borderRadius:8,padding:"8px 12px",marginBottom:6,fontSize:13}}>
            <strong style={{color:C.txt}}>{t.hora} — {c.nombre}</strong>
            <div style={{color:C.mut}}>{v.marca} {v.modelo} | {t.servicio}</div>
          </div>;})}
      </Card>}
      {(vencidos.length>0||proximos.length>0)&&<Card style={{borderColor:C.acc}}>
        <div style={{color:C.acc,fontWeight:700,marginBottom:10}}>⚠️ Alertas de servicio</div>
        {vencidos.map(s=>{const v=vehiculos.find(v=>v.id===s.vehiculoId)||{};
          return <div key={s.id} style={{background:"#ef444415",borderRadius:8,padding:"7px 12px",marginBottom:5,fontSize:13}}>
            <Badge color="red">VENCIDO</Badge> <strong style={{color:C.txt}}> {v.patente} {v.marca} {v.modelo}</strong>
            <div style={{color:C.mut}}>Venció el {s.proximaFecha}</div></div>;})}
        {proximos.map(s=>{const v=vehiculos.find(v=>v.id===s.vehiculoId)||{};
          return <div key={s.id} style={{background:"#f5a62315",borderRadius:8,padding:"7px 12px",marginBottom:5,fontSize:13}}>
            <Badge color="yel">{ddiff(s.proximaFecha)}d</Badge> <strong style={{color:C.txt}}> {v.patente} {v.marca} {v.modelo}</strong>
            <div style={{color:C.mut}}>Vence {s.proximaFecha}</div></div>;})}
      </Card>}
      {turnosHoy.length===0&&vencidos.length===0&&proximos.length===0&&
        <Card><div style={{textAlign:"center",color:C.mut,padding:20}}>✅ Todo en orden, sin alertas</div></Card>}
    </div>
  );
}

function Clientes({clientes,setClientes,vehiculos,setVehiculos,servicios}){
  const[search,setSearch]=useState("");
  const[modal,setModal]=useState(null);
  const[sel,setSel]=useState(null);
  const[form,setForm]=useState({});
  const F=k=>e=>setForm(f=>({...f,[k]:e.target.value}));
  const filtered=clientes.filter(c=>(c.nombre||"").toLowerCase().includes(search.toLowerCase())||(c.telefono||"").includes(search));
  const saveC=()=>{if(sel?.tipo==="editar")setClientes(p=>p.map(c=>c.id===sel.id?{...c,...form}:c));else setClientes(p=>[...p,{...form,id:Date.now()}]);setModal(null);};
  const saveV=()=>{if(sel?.tipo==="editarV")setVehiculos(p=>p.map(v=>v.id===sel.vid?{...v,...form}:v));else setVehiculos(p=>[...p,{...form,id:Date.now(),clienteId:sel.cid}]);setModal(null);};
  const importar=async()=>{
    if(!("contacts"in navigator&&"ContactsManager"in window)){alert("Funciona en Chrome para Android. Ingresá los datos manualmente.");return;}
    try{const contacts=await navigator.contacts.select(["name","tel","email"],{multiple:false});
      if(contacts?.length>0){const c=contacts[0];setForm(f=>({...f,nombre:c.name?.[0]||f.nombre,telefono:c.tel?.[0]||f.telefono,email:c.email?.[0]||f.email}));}}
    catch(e){alert("No se pudo acceder a los contactos.");}
  };
  return(
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
        <h2 style={{margin:0,color:C.txt}}>👥 Clientes</h2>
        <div style={{display:"flex",gap:8}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar..." style={{background:C.inp,border:`1px solid ${C.cb}`,borderRadius:8,padding:"8px 12px",color:C.txt,fontSize:14,outline:"none",width:150}}/>
          <Btn onClick={()=>{setForm({nombre:"",telefono:"",email:""});setSel(null);setModal("c");}}>+ Cliente</Btn>
        </div>
      </div>
      {filtered.length===0&&<Card><div style={{textAlign:"center",color:C.mut,padding:30}}>No hay clientes aún.</div></Card>}
      {filtered.map(c=>{const vehs=vehiculos.filter(v=>v.clienteId===c.id);
        return <Card key={c.id}>
          <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
            <div>
              <div style={{fontWeight:700,fontSize:16,color:C.txt}}>{c.nombre||"Sin nombre"}</div>
              <div style={{color:C.mut,fontSize:13}}>📞 {c.telefono||"—"}{c.email&&` • ✉️ ${c.email}`}</div>
            </div>
            <div style={{display:"flex",gap:6}}>
              <Btn small color="blu" onClick={()=>{setForm({...c});setSel({tipo:"editar",id:c.id});setModal("c");}}>Editar</Btn>
              <Btn small color="grn" onClick={()=>{setForm({patente:"",marca:"",modelo:"",año:"",km:""});setSel({tipo:"nuevo",cid:c.id,nombre:c.nombre});setModal("v");}}>+ Vehículo</Btn>
              <Btn small color="red" onClick={()=>{if(confirm("¿Eliminar cliente?")){setClientes(p=>p.filter(x=>x.id!==c.id));setVehiculos(p=>p.filter(v=>v.clienteId!==c.id));}}}>✕</Btn>
            </div>
          </div>
          {vehs.length>0&&<div style={{marginTop:12,display:"flex",gap:8,flexWrap:"wrap"}}>
            {vehs.map(v=>{const ult=servicios.filter(s=>s.vehiculoId===v.id).sort((a,b)=>b.fecha.localeCompare(a.fecha))[0];const alerta=ult?.proximaFecha&&ddiff(ult.proximaFecha)<=30;
              return <div key={v.id} style={{background:C.inp,borderRadius:10,padding:"10px 14px",fontSize:13,minWidth:160,borderLeft:`3px solid ${alerta?C.acc:C.cb}`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={{fontWeight:700,color:C.txt}}>{v.patente||"Sin patente"}</div>
                  <Btn small color="blu" onClick={()=>{setForm({...v});setSel({tipo:"editarV",vid:v.id});setModal("v");}}>Editar</Btn>
                </div>
                <div style={{color:C.mut}}>{v.marca} {v.modelo} {v.año}</div>
                <div style={{color:C.mut}}>🔢 {Number(v.km||0).toLocaleString()} km</div>
                {ult?.proximaFecha&&<div style={{color:alerta?C.acc:C.mut,fontSize:11,marginTop:4}}>Próx: {ult.proximaFecha}</div>}
              </div>;})}
          </div>}
        </Card>;})}
      {modal==="c"&&<Modal title={sel?.tipo==="editar"?"Editar Cliente":"Nuevo Cliente"} onClose={()=>setModal(null)}>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {!sel?.tipo&&<button onClick={importar} style={{background:"#25D36622",border:"1px solid #25D366",borderRadius:10,color:"#25D366",padding:"10px",fontWeight:700,fontSize:14,cursor:"pointer"}}>📱 Importar desde contactos del celu</button>}
          <Inp label="Nombre" value={form.nombre||""} onChange={F("nombre")}/>
          <Inp label="Teléfono" value={form.telefono||""} onChange={F("telefono")}/>
          <Inp label="Email" value={form.email||""} onChange={F("email")}/>
          <Btn onClick={saveC} style={{marginTop:8}}>Guardar</Btn>
        </div>
      </Modal>}
      {modal==="v"&&<Modal title={sel?.tipo==="editarV"?"Editar Vehículo":`Nuevo Vehículo — ${sel?.nombre}`} onClose={()=>setModal(null)}>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <Inp label="Patente" value={form.patente||""} onChange={e=>setForm(f=>({...f,patente:e.target.value.toUpperCase()}))}/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <Inp label="Marca" value={form.marca||""} onChange={F("marca")}/>
            <Inp label="Modelo" value={form.modelo||""} onChange={F("modelo")}/>
            <Inp label="Año" type="number" value={form.año||""} onChange={F("año")}/>
            <Inp label="KM" type="number" value={form.km||""} onChange={F("km")}/>
          </div>
          <Btn onClick={saveV} style={{marginTop:8}}>Guardar</Btn>
        </div>
      </Modal>}
    </div>
  );
}

function Servicios({servicios,setServicios,vehiculos,setVehiculos,clientes}){
  const[modal,setModal]=useState(false);
  const[tarjeta,setTarjeta]=useState(null);
  const[form,setForm]=useState({});
  const[filtro,setFiltro]=useState("");
  const F=k=>e=>setForm(f=>({...f,[k]:e.target.value}));
  const toggle=t=>setForm(f=>({...f,tipos:(f.tipos||[]).includes(t)?(f.tipos||[]).filter(x=>x!==t):[...(f.tipos||[]),t]}));
  const save=()=>{
    if(!form.vehiculoId||!form.fecha)return;
    const tipo=form.tipos?.length>0?form.tipos.join(" + "):"Servicio general";
    const nuevo={...form,tipo,id:Date.now(),estado:"completado"};
    setServicios(p=>[...p,nuevo]);
    if(form.km)setVehiculos(p=>p.map(v=>v.id===Number(form.vehiculoId)?{...v,km:form.km}:v));
    setModal(false);
    const v=vehiculos.find(v=>v.id===Number(form.vehiculoId))||{};
    const c=clientes.find(c=>c.id===v.clienteId)||{};
    setTarjeta({servicio:nuevo,cliente:c,vehiculo:v});
    if(c.telefono)setTimeout(()=>abrirWa(c.telefono,msgS(nuevo,c,v)),500);
  };
  const sorted=[...servicios].filter(s=>{if(!filtro)return true;const v=vehiculos.find(v=>v.id===s.vehiculoId)||{};const c=clientes.find(c=>c.id===v.clienteId)||{};return(v.patente||"").includes(filtro.toUpperCase())||(c.nombre||"").toLowerCase().includes(filtro.toLowerCase());}).sort((a,b)=>b.fecha.localeCompare(a.fecha));
  return(
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
        <h2 style={{margin:0,color:C.txt}}>🔧 Servicios</h2>
        <div style={{display:"flex",gap:8}}>
          <input value={filtro} onChange={e=>setFiltro(e.target.value)} placeholder="Filtrar..." style={{background:C.inp,border:`1px solid ${C.cb}`,borderRadius:8,padding:"8px 12px",color:C.txt,fontSize:14,outline:"none",width:140}}/>
          <Btn onClick={()=>{setForm({fecha:today(),tipos:[],vehiculoId:"",km:"",detalle:"",costo:"",proximoKm:"",proximaFecha:""});setModal(true);}}>+ Servicio</Btn>
        </div>
      </div>
      {sorted.length===0&&<Card><div style={{textAlign:"center",color:C.mut,padding:30}}>Sin servicios registrados.</div></Card>}
      {sorted.map(s=>{const v=vehiculos.find(v=>v.id===s.vehiculoId)||{};const c=clientes.find(c=>c.id===v.clienteId)||{};const dias=s.proximaFecha?ddiff(s.proximaFecha):null;
        return <Card key={s.id}>
          <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
            <div>
              <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
                <span style={{fontWeight:700,color:C.txt}}>{s.tipo}</span>
                {dias!==null&&dias<0&&<Badge color="red">Vencido</Badge>}
                {dias!==null&&dias>=0&&dias<=30&&<Badge color="yel">{dias}d</Badge>}
                {dias!==null&&dias>30&&<Badge color="grn">Al día</Badge>}
              </div>
              <div style={{color:C.mut,fontSize:13,marginTop:4}}>{c.nombre} • {v.patente} {v.marca} {v.modelo}</div>
              <div style={{color:C.mut,fontSize:12,marginTop:3}}>📅 {s.fecha} • 🔢 {Number(s.km||0).toLocaleString()} km{s.detalle&&` • ${s.detalle}`}</div>
              {s.proximaFecha&&<div style={{fontSize:12,color:dias<0?C.red:dias<=30?C.acc:C.grn,marginTop:3}}>Próx: {fmtF(s.proximaFecha)}{s.proximoKm&&` (${fmtK(s.proximoKm)})`}</div>}
              {s.costo&&<div style={{fontSize:13,color:C.grn,fontWeight:700,marginTop:3}}>💲 {fmt$(s.costo)}</div>}
            </div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
              <Btn small color="blu" onClick={()=>setTarjeta({servicio:s,cliente:c,vehiculo:v})}>🎴 Tarjeta</Btn>
              <WaBtn tel={c.telefono} msg={msgS(s,c,v)}/>
            </div>
          </div>
        </Card>;})}
      {modal&&<Modal title="Registrar Servicio" onClose={()=>setModal(false)}>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <Sel label="Vehículo" value={form.vehiculoId} onChange={e=>setForm(f=>({...f,vehiculoId:e.target.value}))}>
            <option value="">— Seleccionar vehículo —</option>
            {vehiculos.map(v=>{const c=clientes.find(c=>c.id===v.clienteId);return <option key={v.id} value={v.id}>{v.patente} — {v.marca} {v.modelo} ({c?.nombre})</option>;})}
          </Sel>
          <div>
            <div style={{fontSize:13,color:C.mut,marginBottom:8}}>Servicios realizados (podés elegir varios)</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
              {TIPOS.map(t=>{const s=(form.tipos||[]).includes(t);return(
                <button key={t} onClick={()=>toggle(t)} style={{background:s?C.acc:C.inp,color:s?"#111":C.mut,border:`1px solid ${s?C.acc:C.cb}`,borderRadius:8,padding:"6px 12px",fontSize:13,fontWeight:s?700:400,cursor:"pointer"}}>
                  {s?"✓ ":""}{t}</button>);})}
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <Inp label="Fecha" type="date" value={form.fecha} onChange={e=>{const f=e.target.value;const pf=f?new Date(new Date(f).getTime()+365*24*60*60*1000).toISOString().slice(0,10):"";setForm(p=>({...p,fecha:f,proximaFecha:pf}));}}/>
            <Inp label="KM actuales" type="number" value={form.km} onChange={e=>{const km=e.target.value;setForm(p=>({...p,km,proximoKm:km?String(Number(km)+10000):""}));}}/>
            <Inp label="Próximo (fecha)" type="date" value={form.proximaFecha} onChange={F("proximaFecha")}/>
            <Inp label="Próximo (km)" type="number" value={form.proximoKm} onChange={F("proximoKm")}/>
          </div>
          <Inp label="Detalle / producto usado" value={form.detalle} onChange={F("detalle")}/>
          <Inp label="💲 Valor cobrado ($)" type="number" value={form.costo||""} onChange={F("costo")}/>
          <Btn onClick={save} style={{marginTop:4}}>✅ Guardar — generar tarjeta y enviar WhatsApp</Btn>
        </div>
      </Modal>}
      {tarjeta&&<Modal title="🎴 Tarjeta de Servicio" onClose={()=>setTarjeta(null)} wide>
        <TarjetaLubrand servicio={tarjeta.servicio} cliente={tarjeta.cliente} vehiculo={tarjeta.vehiculo}/>
        <div style={{display:"flex",gap:10,marginTop:16,justifyContent:"center",flexWrap:"wrap"}}>
          <WaBtn tel={tarjeta.cliente?.telefono} msg={msgS(tarjeta.servicio,tarjeta.cliente,tarjeta.vehiculo)}/>
          <Btn color="blu" onClick={()=>setTarjeta(null)}>Cerrar</Btn>
        </div>
        <p style={{color:C.mut,fontSize:11,textAlign:"center",marginTop:10}}>Sacá una captura de pantalla para enviarla por WhatsApp</p>
      </Modal>}
    </div>
  );
}

function Turnos({turnos,setTurnos,clientes,vehiculos}){
  const[modal,setModal]=useState(false);
  const[form,setForm]=useState({});
  const[ff,setFf]=useState(today());
  const SERVS=["Cambio de aceite","Cambio de filtros","Revisión general","Lubricación","Otro"];
  const EST={pendiente:{color:"yel",label:"Pendiente"},completado:{color:"grn",label:"Completado"},cancelado:{color:"red",label:"Cancelado"}};
  const F=k=>e=>setForm(f=>({...f,[k]:e.target.value}));
  const save=()=>{
    if(!form.fecha||!form.clienteId)return;
    const nuevo={...form,id:Date.now(),estado:"pendiente",clienteId:Number(form.clienteId),vehiculoId:Number(form.vehiculoId)};
    setTurnos(p=>[...p,nuevo]);setModal(false);
    const c=clientes.find(c=>c.id===Number(form.clienteId))||{};
    const v=vehiculos.find(v=>v.id===Number(form.vehiculoId))||{};
    if(c.telefono)abrirWa(c.telefono,msgT(nuevo,c,v));
  };
  const sorted=[...turnos].filter(t=>!ff||t.fecha===ff).sort((a,b)=>a.hora.localeCompare(b.hora));
  return(
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
        <h2 style={{margin:0,color:C.txt}}>📅 Turnos</h2>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <input type="date" value={ff} onChange={e=>setFf(e.target.value)} style={{background:C.inp,border:`1px solid ${C.cb}`,borderRadius:8,padding:"8px 12px",color:C.txt,fontSize:14,outline:"none"}}/>
          <button onClick={()=>setFf("")} style={{background:"none",border:`1px solid ${C.cb}`,borderRadius:8,padding:"8px 10px",color:C.mut,cursor:"pointer",fontSize:12}}>Todos</button>
          <Btn onClick={()=>{setForm({fecha:ff||today(),hora:"09:00",clienteId:"",vehiculoId:"",servicio:"Cambio de aceite",notas:""});setModal(true);}}>+ Turno</Btn>
        </div>
      </div>
      {sorted.length===0&&<Card><div style={{textAlign:"center",color:C.mut,padding:30}}>No hay turnos.</div></Card>}
      {sorted.map(t=>{const c=clientes.find(c=>c.id===t.clienteId)||{};const v=vehiculos.find(v=>v.id===t.vehiculoId)||{};const est=EST[t.estado]||EST.pendiente;
        return <Card key={t.id}>
          <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
            <div style={{display:"flex",gap:14,alignItems:"center"}}>
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:22,fontWeight:800,color:C.acc}}>{t.hora}</div>
                <div style={{fontSize:10,color:C.mut}}>{t.fecha}</div>
              </div>
              <div>
                <div style={{fontWeight:700,color:C.txt}}>{c.nombre}</div>
                <div style={{color:C.mut,fontSize:13}}>{v.patente&&`${v.patente} • `}{v.marca} {v.modelo}</div>
                <div style={{color:C.mut,fontSize:13}}>{t.servicio}{t.notas&&` — ${t.notas}`}</div>
              </div>
            </div>
            <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
              <Badge color={est.color}>{est.label}</Badge>
              <WaBtn tel={c.telefono} msg={msgT(t,c,v)}/>
              {t.estado==="pendiente"&&<>
                <Btn small color="grn" onClick={()=>setTurnos(p=>p.map(x=>x.id===t.id?{...x,estado:"completado"}:x))}>✓</Btn>
                <Btn small color="red" onClick={()=>setTurnos(p=>p.map(x=>x.id===t.id?{...x,estado:"cancelado"}:x))}>✕</Btn>
              </>}
              <Btn small color="red" onClick={()=>setTurnos(p=>p.filter(x=>x.id!==t.id))}>🗑</Btn>
            </div>
          </div>
        </Card>;})}
      {modal&&<Modal title="Nuevo Turno" onClose={()=>setModal(false)}>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <Inp label="Fecha" type="date" value={form.fecha} onChange={F("fecha")}/>
            <Inp label="Hora" type="time" value={form.hora} onChange={F("hora")}/>
          </div>
          <Sel label="Cliente" value={form.clienteId} onChange={e=>setForm(f=>({...f,clienteId:e.target.value,vehiculoId:""}))}>
            <option value="">— Seleccionar cliente —</option>
            {clientes.map(c=><option key={c.id} value={c.id}>{c.nombre}</option>)}
          </Sel>
          <Sel label="Vehículo" value={form.vehiculoId} onChange={F("vehiculoId")}>
            <option value="">— Seleccionar vehículo —</option>
            {vehiculos.filter(v=>v.clienteId===Number(form.clienteId)).map(v=><option key={v.id} value={v.id}>{v.patente} — {v.marca} {v.modelo}</option>)}
          </Sel>
          <Sel label="Servicio" value={form.servicio} onChange={F("servicio")}>{SERVS.map(s=><option key={s}>{s}</option>)}</Sel>
          <Inp label="Notas (opcional)" value={form.notas} onChange={F("notas")}/>
          <Btn onClick={save} style={{marginTop:4}}>Guardar y enviar WhatsApp</Btn>
        </div>
      </Modal>}
    </div>
  );
}

function Facturacion({servicios,clientes,vehiculos}){
  const[mes,setMes]=useState(today().slice(0,7));
  const filtered=servicios.filter(s=>!mes||s.fecha.startsWith(mes));
  const total=filtered.reduce((a,s)=>a+Number(s.costo||0),0);
  return(
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <h2 style={{margin:0,color:C.txt}}>💰 Facturación</h2>
        <input type="month" value={mes} onChange={e=>setMes(e.target.value)} style={{background:C.inp,border:`1px solid ${C.cb}`,borderRadius:8,padding:"8px 12px",color:C.txt,fontSize:14,outline:"none"}}/>
      </div>
      <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
        <Card style={{flex:1}}><div style={{color:C.mut,fontSize:13}}>Total</div><div style={{fontSize:30,fontWeight:800,color:C.grn}}>{fmt$(total)}</div></Card>
        <Card style={{flex:1}}><div style={{color:C.mut,fontSize:13}}>Servicios</div><div style={{fontSize:30,fontWeight:800,color:C.acc}}>{filtered.length}</div></Card>
        <Card style={{flex:1}}><div style={{color:C.mut,fontSize:13}}>Promedio</div><div style={{fontSize:30,fontWeight:800,color:C.blu}}>{fmt$(filtered.length?Math.round(total/filtered.length):0)}</div></Card>
      </div>
      <Card>
        <div style={{fontWeight:700,color:C.txt,marginBottom:12}}>Detalle</div>
        {filtered.length===0&&<div style={{color:C.mut,textAlign:"center",padding:20}}>Sin registros</div>}
        {[...filtered].sort((a,b)=>b.fecha.localeCompare(a.fecha)).map(s=>{const v=vehiculos.find(v=>v.id===s.vehiculoId)||{};const c=clientes.find(c=>c.id===v.clienteId)||{};
          return <div key={s.id} style={{display:"flex",justifyContent:"space-between",padding:"10px 0",borderBottom:`1px solid ${C.cb}`}}>
            <div><div style={{color:C.txt,fontSize:14,fontWeight:600}}>{s.tipo}</div><div style={{color:C.mut,fontSize:12}}>{s.fecha} • {c.nombre} • {v.patente}</div></div>
            <div style={{color:C.grn,fontWeight:700}}>{fmt$(s.costo)}</div>
          </div>;})}
      </Card>
    </div>
  );
}

function App(){
  const[tab,setTab]=useState("dashboard");
  const[clientes,setClientes]=useState(()=>{try{return JSON.parse(localStorage.getItem("ls_clientes")||"[]")}catch{return[]}});
  const[vehiculos,setVehiculos]=useState(()=>{try{return JSON.parse(localStorage.getItem("ls_vehiculos")||"[]")}catch{return[]}});
  const[servicios,setServicios]=useState(()=>{try{return JSON.parse(localStorage.getItem("ls_servicios")||"[]")}catch{return[]}});
  const[turnos,setTurnos]=useState(()=>{try{return JSON.parse(localStorage.getItem("ls_turnos")||"[]")}catch{return[]}});

  const save=(key,val,set)=>{set(val);try{localStorage.setItem(key,JSON.stringify(val))}catch{}};

  const TABS=[
    {id:"dashboard",icon:"🏠",label:"Panel"},{id:"clientes",icon:"👥",label:"Clientes"},
    {id:"servicios",icon:"🔧",label:"Servicios"},{id:"turnos",icon:"📅",label:"Turnos"},
    {id:"facturacion",icon:"💰",label:"Facturación"},
  ];
  const alertas=servicios.filter(s=>s.proximaFecha&&ddiff(s.proximaFecha)<=30).length;
  return(
    <div style={{minHeight:"100vh",background:C.bg,fontFamily:"'Segoe UI',system-ui,sans-serif",color:C.txt}}>
      <div style={{background:C.card,borderBottom:`1px solid ${C.cb}`,padding:"14px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <svg width="30" height="34" viewBox="0 0 100 115">
            <path d="M28 5 L28 78 Q28 88 40 88 L78 88 L78 102 Q78 112 66 112 L28 112 Q12 112 12 96 L12 5 Z" fill="#c0392b"/>
            <path d="M28 72 L28 96 Q28 112 44 112 L82 112 Q98 112 98 96 L98 88 Q98 76 84 76 L42 76 Q28 76 28 72 Z" fill="#1ab6d4"/>
          </svg>
          <div>
            <div style={{fontWeight:800,fontSize:17,color:C.acc}}>LubrandService</div>
            <div style={{fontSize:11,color:C.mut}}>Lubrand Lubricentro</div>
          </div>
        </div>
        {alertas>0&&<div style={{background:C.red,color:"#fff",borderRadius:99,padding:"3px 10px",fontSize:12,fontWeight:700}}>{alertas} alertas</div>}
        <div style={{display:"flex",gap:6}}>
          <button onClick={()=>{
            const datos={clientes,vehiculos,servicios,turnos};
            const blob=new Blob([JSON.stringify(datos)],{type:"application/json"});
            const a=document.createElement("a");
            a.href=URL.createObjectURL(blob);
            a.download="lubrandservice-backup.json";
            a.click();
          }} style={{background:"#22c55e22",border:"1px solid #22c55e",borderRadius:8,color:"#22c55e",padding:"4px 8px",fontSize:11,fontWeight:700,cursor:"pointer"}}>
            💾 Exportar
          </button>
          <label style={{background:"#3b82f622",border:"1px solid #3b82f6",borderRadius:8,color:"#3b82f6",padding:"4px 8px",fontSize:11,fontWeight:700,cursor:"pointer"}}>
            📂 Importar
            <input type="file" accept=".json" style={{display:"none"}} onChange={e=>{
              const file=e.target.files[0];
              if(!file)return;
              const reader=new FileReader();
              reader.onload=ev=>{
                try{
                  const datos=JSON.parse(ev.target.result);
                  if(datos.clientes)save("ls_clientes",datos.clientes,setClientes);
                  if(datos.vehiculos)save("ls_vehiculos",datos.vehiculos,setVehiculos);
                  if(datos.servicios)save("ls_servicios",datos.servicios,setServicios);
                  if(datos.turnos)save("ls_turnos",datos.turnos,setTurnos);
                  alert("✅ Datos importados correctamente!");
                }catch{alert("Error al importar el archivo.");}
              };
              reader.readAsText(file);
            }}/>
          </label>
        </div>
      </div>
      <div style={{background:C.card,borderBottom:`1px solid ${C.cb}`,display:"flex",overflowX:"auto"}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{background:"none",border:"none",borderBottom:tab===t.id?`2px solid ${C.acc}`:"2px solid transparent",color:tab===t.id?C.acc:C.mut,padding:"12px 14px",cursor:"pointer",fontWeight:tab===t.id?700:400,fontSize:13,whiteSpace:"nowrap"}}>
            {t.icon} {t.label}
          </button>
        ))}
      </div>
      <div style={{maxWidth:900,margin:"0 auto",padding:"20px 16px 60px"}}>
        {tab==="dashboard"&&<Dashboard clientes={clientes} vehiculos={vehiculos} servicios={servicios} turnos={turnos}/>}
        {tab==="clientes"&&<Clientes clientes={clientes} setClientes={v=>save("ls_clientes",v,setClientes)} vehiculos={vehiculos} setVehiculos={v=>save("ls_vehiculos",v,setVehiculos)} servicios={servicios}/>}
        {tab==="servicios"&&<Servicios servicios={servicios} setServicios={v=>save("ls_servicios",v,setServicios)} vehiculos={vehiculos} setVehiculos={v=>save("ls_vehiculos",v,setVehiculos)} clientes={clientes}/>}
        {tab==="turnos"&&<Turnos turnos={turnos} setTurnos={v=>save("ls_turnos",v,setTurnos)} clientes={clientes} vehiculos={vehiculos}/>}
        {tab==="facturacion"&&<Facturacion servicios={servicios} clientes={clientes} vehiculos={vehiculos}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
